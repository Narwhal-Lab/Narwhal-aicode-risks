  open-source AI agent framework by Peter Steinberger (renamed from Clawdbot/Moltbot). Earlier draft
  spelled "Andrei Karpathy" — actual spelling is Andrej Karpathy. The earlier sibling case
  `2026-agent-architecture-bias-db` was found to be the same incident from a different angle and
  has been merged into this file as section 5b. Some unsourced figures in the deleted draft
  (75% / 32% Moltbook-instance vulnerability rates) were dropped.
